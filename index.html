<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avaliação Clínica | WR TEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://js.puter.com/v2/"></script>

    <style>
        :root {
            --bg-primary: #0b0f1a;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --msg-user: linear-gradient(135deg, #8b5cf6, #6d28d9);
            --msg-bot: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Impede scroll na página inteira, apenas no chat rola */
        }

        /* Header Fixo Topo */
        header {
            background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .avatar-ia {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .header-info h1 { font-size: 1.1rem; font-weight: 600; }
        .header-info p { font-size: 0.8rem; color: var(--accent-cyan); display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 8px; height: 8px; background-color: var(--accent-cyan); border-radius: 50%; display: inline-block; animation: blink 2s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Área do Chat (Rolagem) */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Estilização da Barra de Rolagem */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot {
            align-self: flex-start;
            background: var(--msg-bot);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .user {
            align-self: flex-end;
            background: var(--msg-user);
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        /* Status de Digitação */
        #status-ia {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-left: 20px;
            margin-bottom: 10px;
            font-style: italic;
            display: none;
        }

        /* Rodapé de Interação (Input + Créditos) */
        .interaction-area {
            background: rgba(11, 15, 26, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            padding: 15px 20px 25px 20px; /* Padding extra embaixo para mobile */
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-purple); background: rgba(255, 255, 255, 0.08); }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .send-btn:hover { transform: scale(1.05); }

        /* Links e Créditos (Compactos e Elegantes) */
        .footer-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(6, 182, 212, 0.1);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(6, 182, 212, 0.2);
            transition: 0.3s;
        }

        .whatsapp-link:hover { background: rgba(6, 182, 212, 0.2); color: white; }

        .credits {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .credits strong { color: var(--accent-purple); }

    </style>
</head>
<body>

    <header>
        <div class="avatar-ia">
            <i class="fa-solid fa-brain"></i>
        </div>
        <div class="header-info">
            <h1>IA Clínica - WR TEC</h1>
            <p><span class="online-dot"></span> Online e pronto para ouvir</p>
        </div>
    </header>

    <div id="chat-window">
        </div>

    <div id="status-ia">A inteligência clínica está analisando seu relato...</div>

    <div class="interaction-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Digite sua mensagem aqui..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

        <div class="footer-links">
            <a href="https://wa.me/5541992531598?text=Olá%20William,%20gostaria%20de%20um%20projeto%20com%20IA%20similar%20ao%20seu." class="whatsapp-link" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> Contratar Projeto Similar
            </a>
            <div class="credits">
                Desenvolvido por <strong>WR-TECNOLOGIA | William Ribeiro</strong>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const statusIA = document.getElementById('status-ia');

        // O Cérebro da IA (Instruções Clínicas Avançadas)
        const systemPrompt = `
        Você é uma Inteligência Artificial Clínica avançada, programada pelo Terapeuta, Psicanalista e Sexólogo William Ribeiro. Suas informações são estritamente baseadas em estudos acadêmicos sérios e documentos científicos de cuidado da saúde mental.

        DIRETRIZES DE ATENDIMENTO:
        1. ABERTURA (PRIMEIRA MENSAGEM): Apresente-se de forma empática. Diga claramente que foi programada pelo William Ribeiro. Explique brevemente, de forma acessível, a metodologia que usará: PATHOS (para rastreio de dependência), CSBI-13 (para medir comportamento compulsivo) e DSM-5 (para categorização clínica). Em seguida, peça uma "bença", pergunte o nome, a idade e convide a pessoa a relatar livremente o que a trouxe aqui.
        2. ESCUTA ATIVA: Após o relato inicial, NÃO faça perguntas engessadas. Aja como um analista investigativo. Faça perguntas naturais e lógicas baseadas exclusivamente no que o paciente acabou de dizer, buscando entender o quadro geral.
        3. CONDUÇÃO DISCRETA: Guie a conversa para obter os dados necessários para os 3 protocolos (sinais de compulsão, histórico, sofrimento clínico) sem parecer um robô lendo um questionário.
        4. MOMENTO DIAGNÓSTICO: Quando tiver informações suficientes (após algumas trocas de mensagens), apresente uma leitura técnica do caso. Você DEVE usar os 3 protocolos na sua explicação e fornecer um PERCENTUAL DE POSSIBILIDADE (ex: "Existe 80% de probabilidade de compatibilidade com [Patologia/Disfunção]").
        5. TOM DE VOZ: Prático, acessível (estilo conversa de WhatsApp), acolhedor, sem perder a seriedade clínica.
        `;

        let conversationHistory = [{ role: "system", content: systemPrompt }];

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            // Converte quebras de linha em <br> para manter a formatação do texto da IA
            div.innerHTML = text.replace(/\n/g, '<br>'); 
            
            chatWindow.appendChild(div);
            // Rola automaticamente para a última mensagem
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            conversationHistory.push({ role: "user", content: text });
            
            statusIA.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await puter.ai.chat(conversationHistory);
                const aiReply = response.message.content;
                
                addMessage('bot', aiReply);
                conversationHistory.push({ role: "assistant", content: aiReply });
            } catch (err) {
                addMessage('bot', 'Desculpe, tive uma instabilidade na conexão. Podemos tentar novamente?');
                console.error(err);
            } finally {
                statusIA.style.display = 'none';
            }
        }

        // Gatilho inicial para a IA mandar a primeira mensagem baseada no prompt
        window.onload = async () => {
            statusIA.style.display = 'block';
            try {
                // Enviamos um comando oculto para a IA iniciar a conversa conforme as diretrizes
                const startResponse = await puter.ai.chat([
                    { role: "system", content: systemPrompt },
                    { role: "user", content: "Inicie o atendimento conforme suas diretrizes de abertura." }
                ]);
                const firstReply = startResponse.message.content;
                addMessage('bot', firstReply);
                conversationHistory.push({ role: "assistant", content: firstReply });
            } catch (err) {
                addMessage('bot', 'Olá! Sou a IA Clínica desenvolvida por WR-TEC. Como posso te ajudar hoje?');
            } finally {
                statusIA.style.display = 'none';
            }
        };
    </script>
</body>
</html>

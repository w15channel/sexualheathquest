<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avaliação Clínica | WR TEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://js.puter.com/v2/"></script>

    <style>
        :root {
            --bg-primary: #0b0f1a;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --msg-user: linear-gradient(135deg, #8b5cf6, #6d28d9);
            --msg-bot: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100dvh; /* dvh resolve problemas de barra em navegadores mobile */
            overflow: hidden; 
        }

        /* Header Fixo Topo */
        header {
            background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
            flex-shrink: 0;
        }

        .avatar-ia {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
            flex-shrink: 0;
        }

        .header-info h1 { font-size: 1.1rem; font-weight: 600; }
        .header-info p { font-size: 0.8rem; color: var(--accent-cyan); display: flex; align-items: center; gap: 5px; margin-top: 2px;}
        .online-dot { width: 8px; height: 8px; background-color: var(--accent-cyan); border-radius: 50%; display: inline-block; animation: blink 2s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Área do Chat (Rolagem) */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot {
            align-self: flex-start;
            background: var(--msg-bot);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .user {
            align-self: flex-end;
            background: var(--msg-user);
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        /* Status de Digitação */
        #status-ia {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-left: 20px;
            margin-bottom: 10px;
            font-style: italic;
            display: none;
            flex-shrink: 0;
        }

        /* Rodapé de Interação (Input + Créditos) */
        .interaction-area {
            background: rgba(11, 15, 26, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            padding: 15px 20px;
            padding-bottom: max(15px, env(safe-area-inset-bottom)); /* Proteção para iPhone/Android */
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            flex-shrink: 0; /* Impede que o rodapé seja esmagado */
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-purple); background: rgba(255, 255, 255, 0.08); }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.05); }

        /* Links e Créditos (Compactos e Elegantes) */
        .footer-links {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(6, 182, 212, 0.1);
            padding: 6px 12px;
            border-radius: 50px;
            border: 1px solid rgba(6, 182, 212, 0.2);
            transition: 0.3s;
            white-space: nowrap;
        }

        .whatsapp-link:hover { background: rgba(6, 182, 212, 0.2); color: white; }

        .credits {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: right;
            line-height: 1.2;
        }
        .credits strong { color: var(--accent-purple); display: block;}

        @media (max-width: 400px) {
            .footer-links { flex-direction: column; align-items: stretch; text-align: center; }
            .credits { text-align: center; margin-top: 5px; }
            .whatsapp-link { justify-content: center; }
        }

    </style>
</head>
<body>

    <header>
        <div class="avatar-ia">
            <i class="fa-solid fa-brain"></i>
        </div>
        <div class="header-info">
            <h1>IA Clínica</h1>
            <p><span class="online-dot"></span> Online e avaliando</p>
        </div>
    </header>

    <div id="chat-window">
        </div>

    <div id="status-ia">Processando dados clínicos...</div>

    <div class="interaction-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Sua resposta..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

        <div class="footer-links">
            <a href="https://wa.me/5541992531598?text=Olá%20William,%20gostaria%20de%20um%20projeto%20com%20IA%20similar%20ao%20seu." class="whatsapp-link" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> Contratar Projeto
            </a>
            <div class="credits">
                Desenvolvido por<br><strong>WR-TECNOLOGIA | William Ribeiro</strong>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const statusIA = document.getElementById('status-ia');

        // O Cérebro da IA - Instruções Clínicas Atualizadas e Restritas
        const systemPrompt = `
        Você é uma IA Clínica programada pelo Psicoterapeuta, Psicanalista e Especialista em Sexualidade Integrativa William Ribeiro. (Atenção: JAMAIS o chame de 'Dr.'). 

        REGRAS DE FORMATAÇÃO E TOM DE VOZ (CRÍTICO):
        - Respostas devem ser EXTREMAMENTE CURTAS, diretas e pontuais (estilo chat de WhatsApp). Sem textos longos.
        - Tom profissional, neutro e empático. 
        - É estritamente PROIBIDO o uso de palavras de cunho religioso ou informal como "bença", "abençoar", "querido", etc.

        FLUXO OBRIGATÓRIO (Faça UMA pergunta por vez, espere a resposta):
        1. ABERTURA: Cumprimente, apresente rapidamente o projeto (baseado no PATHOS, CSBI-13 e DSM-5) e os títulos do seu criador William Ribeiro. Em seguida, pergunte apenas: "Qual é o seu nome completo?".
        2. COLETA DE DADOS PASSO A PASSO: 
           - Após o nome, pergunte a idade.
           - Após a idade, pergunte o gênero.
           - Após o gênero, peça um relato curto sobre o problema enfrentado.
        3. ANÁLISE DO RELATO: Cruze os dados (nome, idade, gênero, relato). Se o paciente já respondeu algo no relato que cobriria uma pergunta do questionário, NÃO faça essa pergunta novamente.
        4. AVALIAÇÃO: Faça perguntas curtas para completar o diagnóstico. MÁXIMO de 10 perguntas por método avaliativo.
           - As perguntas DEVEM ser de "Sim ou Não" OU usar a escala: "Nunca, Raramente, Às vezes, Com frequência, Sempre".
           - Mande apenas UMA pergunta por vez.
        5. DIAGNÓSTICO FINAL: Ao concluir, entregue um parecer clínico percentual cruzando os dados e protocolos (ex: "Cruzando seu perfil com o DSM-5, há XX% de possibilidade diagnóstica para [Transtorno/Disfunção]").
        `;

        let conversationHistory = [{ role: "system", content: systemPrompt }];

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>'); 
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            conversationHistory.push({ role: "user", content: text });
            
            statusIA.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await puter.ai.chat(conversationHistory);
                const aiReply = response.message.content;
                
                addMessage('bot', aiReply);
                conversationHistory.push({ role: "assistant", content: aiReply });
            } catch (err) {
                addMessage('bot', 'Tive uma pequena falha de conexão. Pode repetir?');
                console.error(err);
            } finally {
                statusIA.style.display = 'none';
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        // Gatilho inicial
        window.onload = async () => {
            statusIA.style.display = 'block';
            try {
                const startResponse = await puter.ai.chat([
                    { role: "system", content: systemPrompt },
                    { role: "user", content: "Inicie o atendimento conforme o passo 1 do seu fluxo obrigatório. Seja breve." }
                ]);
                const firstReply = startResponse.message.content;
                addMessage('bot', firstReply);
                conversationHistory.push({ role: "assistant", content: firstReply });
            } catch (err) {
                addMessage('bot', 'Olá. Sou a IA Clínica programada pelo Psicoterapeuta, Psicanalista e Especialista em Sexualidade Integrativa William Ribeiro. Vamos iniciar a análise. Qual o seu nome completo?');
            } finally {
                statusIA.style.display = 'none';
            }
        };
    </script>
</body>
</html>

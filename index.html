<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avaliação Clínica | WR TEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://js.puter.com/v2/"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-primary: #0b0f1a;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --msg-user: linear-gradient(135deg, #8b5cf6, #6d28d9);
            --msg-bot: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.08) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden; 
        }

        /* Cabeçalho Profissional */
        header {
            background: rgba(11, 15, 26, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .avatar-ia {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .header-info h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
        .header-info p { font-size: 0.8rem; color: var(--accent-cyan); display: flex; align-items: center; gap: 6px; margin-top: 3px;}
        .online-dot { width: 8px; height: 8px; background-color: var(--accent-cyan); border-radius: 50%; display: inline-block; animation: blink 2s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Botão de Áudio */
        .audio-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .audio-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .audio-btn.active { color: var(--accent-cyan); border-color: rgba(6, 182, 212, 0.3); }

        /* Área do Chat */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot {
            align-self: flex-start;
            background: var(--msg-bot);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .user {
            align-self: flex-end;
            background: var(--msg-user);
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        #status-ia {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-left: 25px;
            margin-bottom: 10px;
            font-style: italic;
            display: none;
        }

        /* Botão Salvar Tela (Aparece no diagnóstico) */
        .print-btn {
            display: none;
            align-self: center;
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px 0;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }
        .print-btn:hover { background: var(--accent-cyan); color: #000; }

        /* Rodapé de Interação Espaçoso */
        .interaction-area {
            background: rgba(11, 15, 26, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            padding: 20px 25px 30px 25px; 
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 10;
            flex-shrink: 0;
        }

        .input-wrapper { display: flex; gap: 12px; align-items: center; }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 16px 22px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-purple); background: rgba(255, 255, 255, 0.08); }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); }

        /* Links e Créditos (Profissional) */
        .footer-links {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.3s;
        }
        .whatsapp-link:hover { color: var(--text-main); }
        .whatsapp-link i { color: #25d366; font-size: 1rem; }

        .credits {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            text-align: right;
            line-height: 1.4;
        }
        .credits strong { color: var(--text-main); font-weight: 600; }

        @media (max-width: 500px) {
            header { padding: 15px; }
            .header-info h1 { font-size: 1rem; }
            .audio-btn span { display: none; } /* Esconde texto no mobile, deixa só ícone */
            .footer-links { flex-direction: column; gap: 15px; text-align: center; }
            .credits { text-align: center; }
        }

    </style>
</head>
<body>

    <div id="yt-player" style="display: none;"></div>

    <header>
        <div class="header-left">
            <div class="avatar-ia"><i class="fa-solid fa-brain"></i></div>
            <div class="header-info">
                <h1>Selfie</h1>
                <p><span class="online-dot"></span> Online e avaliando</p>
            </div>
        </div>
        <button class="audio-btn" id="btn-audio" onclick="toggleAudio()">
            <i class="fa-solid fa-volume-xmark"></i> <span>Ativar Som</span>
        </button>
    </header>

    <div id="chat-window">
        </div>

    <button class="print-btn" id="btn-print" onclick="salvarTela()">
        <i class="fa-solid fa-camera"></i> Salvar Tela do Diagnóstico
    </button>

    <div id="status-ia">Aguarde, processando informações...</div>

    <div class="interaction-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Digite sua resposta..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

        <div class="footer-links">
            <a href="https://wa.me/5541992531598?text=Olá%20William,%20gostaria%20de%20um%20projeto%20com%20IA%20similar%20ao%20seu." class="whatsapp-link" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> Contratar Projeto Similar
            </a>
            <div class="credits">
                Desenvolvido por <strong>WR-TECNOLOGIA | William Ribeiro &copy;</strong>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // === CONTROLE DO SOM AMBIENTE (YOUTUBE) ===
        let player;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0',
                width: '0',
                videoId: 'rugSfM5UPFI',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'rugSfM5UPFI' }
            });
        }

        function toggleAudio() {
            const btn = document.getElementById('btn-audio');
            if (isPlaying) {
                player.pauseVideo();
                btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i> <span>Ambiente Silenciado</span>';
                btn.classList.remove('active');
            } else {
                player.playVideo();
                btn.innerHTML = '<i class="fa-solid fa-volume-high"></i> <span>Silenciar Ambiente</span>';
                btn.classList.add('active');
            }
            isPlaying = !isPlaying;
        }

        // === CONTROLE DE TELA (HTML2CANVAS) ===
        function salvarTela() {
            // Oculta o botão temporariamente para não sair no print
            const btnPrint = document.getElementById('btn-print');
            btnPrint.style.display = 'none';

            html2canvas(document.getElementById("chat-window"), {
                backgroundColor: "#0b0f1a",
                scale: 2
            }).then(canvas => {
                let link = document.createElement('a');
                link.download = 'Diagnostico_WR_TEC.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
                btnPrint.style.display = 'flex'; // Volta o botão
            });
        }

        // === CÉREBRO DA IA ===
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const statusIA = document.getElementById('status-ia');
        const btnPrint = document.getElementById('btn-print');

        const systemPrompt = `
        Você é a "Selfie", uma Inteligência Artificial Clínica, programada exclusivamente pelo Psicoterapeuta, Psicanalista e Especialista em Sexualidade Integrativa William Ribeiro (NUNCA o chame de Dr.).

        PERFIL: Acolhedora, empática, profissional e clínica. 

        FLUXO OBRIGATÓRIO (Aguarde a resposta após CADA pergunta. Não faça blocos de perguntas):
        1. Você já se apresentou e pediu o nome. (O usuário vai mandar o nome agora).
        2. Agradeça calorosamente a presença da pessoa usando o nome dela. Em seguida, peça a IDADE.
        3. Após a idade, peça o GÊNERO.
        4. Após o gênero, peça, de forma acolhedora, um RELATO CURTO do problema.
        5. ANÁLISE E AVALIAÇÃO: Comece a fazer perguntas para o diagnóstico. Use PATHOS, CSBI-13 e DSM-5.
           - Faça NO MÁXIMO 10 perguntas curtas e pontuais (Sim/Não ou Nunca/Sempre).
           - Não repita o que a pessoa já disse no relato.
           - Envie UMA pergunta de cada vez.
        6. DIAGNÓSTICO: Ao obter dados suficientes, dê o parecer clínico. Use os protocolos científicos e forneça um PERCENTUAL de possibilidade.
        7. APÓS O DIAGNÓSTICO, pergunte à pessoa: "Você já salvou o print da nossa tela de diagnóstico?".
        8. DESPEDIDA (APÓS A RESPOSTA SOBRE O PRINT): Dê um conselho acolhedor. Avise que esta ferramenta deve ser usada EXCLUSIVAMENTE junto a um profissional qualificado, pois o tratamento só é válido com conhecimento técnico. Informe que a página já pode ser fechada, pois o teste foi concluído com sucesso.
        `;

        let conversationHistory = [{ role: "system", content: systemPrompt }];

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>'); 
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Se for a IA falando sobre diagnóstico, exibe o botão de print
            if (sender === 'bot' && (text.toLowerCase().includes("diagnóstico") || text.includes("%"))) {
                btnPrint.style.display = 'flex';
                chatWindow.appendChild(btnPrint); // Move o botão para debaixo da mensagem
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            conversationHistory.push({ role: "user", content: text });
            
            statusIA.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await puter.ai.chat(conversationHistory);
                const aiReply = response.message.content;
                
                addMessage('bot', aiReply);
                conversationHistory.push({ role: "assistant", content: aiReply });
            } catch (err) {
                addMessage('bot', 'Tive uma pequena falha de conexão. Poderia repetir, por favor?');
            } finally {
                statusIA.style.display = 'none';
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        // Mensagens Iniciais Hardcoded (Para garantir controle absoluto da apresentação)
        window.onload = () => {
            setTimeout(() => {
                const msg1 = "Olá! Sou a Selfie, sua assistente de inteligência artificial. Minha função é realizar uma pré-avaliação clínica utilizando métodos científicos validados, como o PATHOS, o CSBI-13 e os critérios do DSM-5. Fui desenvolvida por William Ribeiro, Psicoterapeuta, Psicanalista e Especialista em Sexualidade Integrativa.";
                addMessage('bot', msg1);
                conversationHistory.push({ role: "assistant", content: msg1 });

                setTimeout(() => {
                    const msg2 = "Para começarmos de forma bem acolhedora e personalizada, como você gostaria de ser chamado(a)?";
                    addMessage('bot', msg2);
                    conversationHistory.push({ role: "assistant", content: msg2 });
                }, 1500);
            }, 500);
        };
    </script>
</body>
</html>

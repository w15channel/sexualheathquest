<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avaliação Clínica | WR TEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://js.puter.com/v2/"></script>

    <style>
        :root {
            --bg-primary: #0b0f1a;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --msg-user: linear-gradient(135deg, #8b5cf6, #6d28d9);
            --msg-bot: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.08) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden; 
        }

        /* Cabeçalho Profissional */
        header {
            background: rgba(11, 15, 26, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 18px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .avatar-ia {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
        }

        .header-info h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
        .header-info p { font-size: 0.8rem; color: var(--accent-cyan); display: flex; align-items: center; gap: 6px; margin-top: 3px;}
        .online-dot { width: 8px; height: 8px; background-color: var(--accent-cyan); border-radius: 50%; display: inline-block; animation: blink 2s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Botão de Áudio */
        .audio-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .audio-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .audio-btn.active { color: var(--accent-cyan); border-color: rgba(6, 182, 212, 0.3); }

        /* Área do Chat */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot {
            align-self: flex-start;
            background: var(--msg-bot);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .user {
            align-self: flex-end;
            background: var(--msg-user);
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        #status-ia {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-left: 25px;
            margin-bottom: 10px;
            font-style: italic;
            display: none;
        }

        /* Botão Copiar (Aparece SOMENTE no diagnóstico) */
        .copy-btn {
            display: none;
            align-self: center;
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px 0;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
        }
        .copy-btn:hover { background: var(--accent-cyan); color: #000; }

        /* Rodapé de Interação Espaçoso */
        .interaction-area {
            background: rgba(11, 15, 26, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            padding: 20px 25px 30px 25px; 
            display: flex;
            flex-direction: column;
            gap: 18px;
            z-index: 10;
            flex-shrink: 0;
        }

        .input-wrapper { display: flex; gap: 12px; align-items: center; }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 16px 22px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-purple); background: rgba(255, 255, 255, 0.08); }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); }

        /* Links e Créditos */
        .footer-links {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .action-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .whatsapp-link:hover { color: var(--text-main); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .whatsapp-link i { color: #25d366; font-size: 0.9rem; }

        .credits {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.5px;
            text-align: right;
            line-height: 1.4;
        }
        .credits strong { color: var(--text-main); font-weight: 600; }

        @media (max-width: 600px) {
            header { padding: 15px; }
            .header-info h1 { font-size: 1rem; }
            .audio-btn span { display: none; }
            .footer-links { flex-direction: column; text-align: center; justify-content: center; }
            .action-links { justify-content: center; }
            .credits { text-align: center; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div id="yt-player" style="display: none;"></div>

    <header>
        <div class="header-left">
            <div class="avatar-ia"><i class="fa-solid fa-brain"></i></div>
            <div class="header-info">
                <h1>Selfie</h1>
                <p><span class="online-dot"></span> Online e avaliando</p>
            </div>
        </div>
        <button class="audio-btn active" id="btn-audio" onclick="toggleAudio()">
            <i class="fa-solid fa-volume-high"></i> <span>Silenciar Ambiente</span>
        </button>
    </header>

    <div id="chat-window">
        </div>

    <button class="copy-btn" id="btn-copy" onclick="copiarDiagnostico()">
        <i class="fa-regular fa-copy"></i> Copiar Diagnóstico
    </button>

    <div id="status-ia">Processando informações, por favor aguarde...</div>

    <div class="interaction-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Digite sua resposta..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

        <div class="footer-links">
            <div class="action-links">
                <a href="https://wa.me/5541992531598?text=Olá%20William,%20gostaria%20de%20um%20projeto%20com%20IA%20similar%20ao%20seu." class="whatsapp-link" target="_blank">
                    <i class="fa-brands fa-whatsapp"></i> Contratar Projeto Similar
                </a>
                <a href="https://wa.me/5541992531598?text=Olá,%20encontrei%20um%20problema%20de%20funcionamento%20na%20página%20da%20IA%20Clínica." class="whatsapp-link" target="_blank">
                    <i class="fa-solid fa-triangle-exclamation" style="color: #f59e0b;"></i> Relatar problema
                </a>
            </div>
            <div class="credits">
                Desenvolvido por <strong>WR-TECNOLOGIA | William Ribeiro &copy;</strong>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // === CONTROLE DO SOM AMBIENTE (YOUTUBE) ===
        let player;
        let isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0',
                width: '0',
                videoId: 'rugSfM5UPFI',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'rugSfM5UPFI' },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // Tenta dar play quando carregar (depende da política do navegador)
        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // Atualiza o botão baseado no status real do YouTube (play/pause)
        function onPlayerStateChange(event) {
            const btn = document.getElementById('btn-audio');
            if (event.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                btn.innerHTML = '<i class="fa-solid fa-volume-high"></i> <span>Silenciar Ambiente</span>';
                btn.classList.add('active');
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.UNSTARTED) {
                isPlaying = false;
                btn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i> <span>Ativar Som</span>';
                btn.classList.remove('active');
            }
        }

        function toggleAudio() {
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        // === CÉREBRO DA IA ===
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const statusIA = document.getElementById('status-ia');
        const btnCopy = document.getElementById('btn-copy');

        // Variável para armazenar somente a resposta do diagnóstico
        let textoDiagnosticoAtual = "";

        const systemPrompt = `
        Você é a "Selfie", uma Inteligência Artificial Clínica, programada exclusivamente pelo Psicoterapeuta, Psicanalista e Especialista em Sexualidade Integrativa William Ribeiro (NUNCA o chame de Dr. ou Doutor).

        PERFIL E REGRAS CRÍTICAS:
        - Acolhedora, atenciosa, profissional e clínica.
        - Respostas curtas e pontuais.
        - LINGUAGEM 100% PROFISSIONAL E BRASILEIRA: Use EXCLUSIVAMENTE o português do Brasil para nomes de disfunções e patologias (Ex: Dispareunia, Vaginismo, Transtorno Erétil). É terminantemente PROIBIDO usar termos em inglês (como dyspareunia). Proibido usar termos religiosos ou gírias (nada de "bença", etc).
        - VÍNCULO PROFISSIONAL: Assuma que o usuário JÁ FOI ENCAMINHADO por um profissional. Não recomende a busca de novos profissionais; a sua função é unificar as forças com quem já o atende.

        FLUXO OBRIGATÓRIO (Aguarde a resposta após CADA pergunta):
        1. ABERTURA E APRESENTAÇÃO: Apresente sua função, explique os métodos científicos (PATHOS, CSBI-13, DSM-5) e os títulos do desenvolvedor William Ribeiro. Pergunte o nome do paciente.
        2. COLETA DE DADOS: Agradeça a presença. Peça a IDADE, depois o GÊNERO, depois um RELATO CURTO do problema.
        3. AVALIAÇÃO: Faça perguntas diagnósticas (máximo 10, "Sim/Não" ou Escala), uma por vez.
        4. DIAGNÓSTICO: Ao finalizar, entregue o parecer cruzando dados com o DSM-5 com PERCENTUAL de possibilidade.
           ***MUITO IMPORTANTE***: O parágrafo com o resultado DEVE começar estritamente com a palavra "Diagnóstico:" (com dois pontos). 
        5. ENCERRAMENTO: Oriente o paciente a clicar no botão "Copiar Diagnóstico" que apareceu na tela e a enviar a cópia ao profissional que o acompanha. Avise que o teste foi concluído e a página pode ser fechada.
        `;

        let conversationHistory = [{ role: "system", content: systemPrompt }];

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>'); 
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Se for a IA falando e contiver o termo chave "Diagnóstico:"
            if (sender === 'bot' && text.includes("Diagnóstico:")) {
                textoDiagnosticoAtual = text; // Salva SÓ esta mensagem
                btnCopy.style.display = 'flex';
                chatWindow.appendChild(btnCopy); 
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            conversationHistory.push({ role: "user", content: text });
            
            statusIA.style.display = 'block';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await puter.ai.chat(conversationHistory);
                const aiReply = response.message.content;
                
                addMessage('bot', aiReply);
                conversationHistory.push({ role: "assistant", content: aiReply });
            } catch (err) {
                addMessage('bot', 'Tive uma pequena falha de conexão. Poderia repetir, por favor?');
            } finally {
                statusIA.style.display = 'none';
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }
        }

        // === LÓGICA DE COPIAR APENAS O DIAGNÓSTICO ===
        function copiarDiagnostico() {
            if (!textoDiagnosticoAtual) return;

            let textoCopia = "--- RESULTADO DA AVALIAÇÃO CLÍNICA (IA SELFIE - WR TEC) ---\n";
            textoCopia += "Profissional Responsável: William Ribeiro (Psicoterapeuta, Psicanalista e Especialista em Sexualidade Integrativa)\n\n";
            
            // Pega o texto limpo, removendo eventuais quebras de linha em HTML
            textoCopia += textoDiagnosticoAtual.replace(/<br>/g, '\n');

            navigator.clipboard.writeText(textoCopia).then(() => {
                btnCopy.innerHTML = '<i class="fa-solid fa-check"></i> Copiado com Sucesso!';
                btnCopy.style.background = "#22c55e"; 
                btnCopy.style.color = "#fff";
                btnCopy.style.borderColor = "#22c55e";
                
                setTimeout(() => {
                    btnCopy.innerHTML = '<i class="fa-regular fa-copy"></i> Copiar Diagnóstico';
                    btnCopy.style.background = "rgba(6, 182, 212, 0.15)";
                    btnCopy.style.color = "var(--accent-cyan)";
                    btnCopy.style.borderColor = "var(--accent-cyan)";
                }, 3000);
            }).catch(err => {
                alert('Erro ao copiar. O navegador pode ter bloqueado a ação.');
            });
        }

        // === INICIALIZAÇÃO DINÂMICA ===
        window.onload = async () => {
            statusIA.style.display = 'block';
            
            try {
                const startResponse = await puter.ai.chat([
                    { role: "system", content: systemPrompt },
                    { role: "user", content: "Por favor, inicie nosso atendimento executando apenas o Passo 1 do seu fluxo obrigatório. Crie sua própria mensagem de apresentação." }
                ]);
                const firstReply = startResponse.message.content;
                addMessage('bot', firstReply);
                conversationHistory.push({ role: "assistant", content: firstReply });
            } catch (err) {
                const fallbackMsg = "Olá! Sou a Selfie, sua assistente de Inteligência Artificial Clínica. Fui desenvolvida pelo Psicoterapeuta, Psicanalista e Especialista em Sexualidade Integrativa William Ribeiro. Utilizo métodos científicos validados, como o PATHOS, o CSBI-13 e os critérios do DSM-5, para realizar a sua pré-avaliação. Para começarmos, qual é o seu nome completo?";
                addMessage('bot', fallbackMsg);
                conversationHistory.push({ role: "assistant", content: fallbackMsg });
            } finally {
                statusIA.style.display = 'none';
            }
        };
    </script>
</body>
</html>
